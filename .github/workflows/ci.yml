name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Clippy runs against the full workspace including llm-guard-ml.
  # We do NOT pass `--all-features` because that would activate
  # `cuda` / `coreml` / `directml` simultaneously, and only one EP is
  # meaningful on any given host. We explicitly check the two
  # feature combinations consumers actually use:
  #   1. base crate alone (default features)
  #   2. base crate with fuzzy
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --features llm-guard/fuzzy -- -D warnings

  # `llm-guard` (the base crate) is the contract we guarantee across
  # platforms and MSRV. Tested on:
  #   - Linux x86_64 + aarch64 (cross + qemu)
  #   - macOS Apple Silicon
  #   - Windows x86_64 native + aarch64 build-only
  # Each platform runs the test suite at stable AND the 1.85 MSRV.
  test-base:
    name: base test ${{ matrix.target }} (${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  toolchain: stable }
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  toolchain: "1.85" }
          - { os: ubuntu-latest,    target: aarch64-unknown-linux-gnu, toolchain: stable, cross: true }
          - { os: ubuntu-latest,    target: aarch64-unknown-linux-gnu, toolchain: "1.85", cross: true }
          - { os: macos-latest,     target: aarch64-apple-darwin,      toolchain: stable }
          - { os: macos-latest,     target: aarch64-apple-darwin,      toolchain: "1.85" }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    toolchain: stable }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    toolchain: "1.85" }
          - { os: windows-latest,   target: aarch64-pc-windows-msvc,   toolchain: stable, build_only: true }
          - { os: windows-latest,   target: aarch64-pc-windows-msvc,   toolchain: "1.85", build_only: true }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: base-${{ matrix.target }}-${{ matrix.toolchain }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      # Build the base crate, default features.
      - name: Build (default)
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p llm-guard --target ${{ matrix.target }} --verbose
          else
            cargo build -p llm-guard --target ${{ matrix.target }} --verbose
          fi

      # Build the base crate with the fuzzy feature on.
      - name: Build (--features fuzzy)
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p llm-guard --features fuzzy --target ${{ matrix.target }} --verbose
          else
            cargo build -p llm-guard --features fuzzy --target ${{ matrix.target }} --verbose
          fi

      - name: Test (default)
        if: matrix.build_only != true
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross test -p llm-guard --target ${{ matrix.target }} --verbose
          else
            cargo test -p llm-guard --target ${{ matrix.target }} --verbose
          fi

      - name: Test (--features fuzzy)
        if: matrix.build_only != true
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross test -p llm-guard --features fuzzy --target ${{ matrix.target }} --verbose
          else
            cargo test -p llm-guard --features fuzzy --target ${{ matrix.target }} --verbose
          fi

  # `llm-guard-ml` has a much narrower matrix because:
  #   1. ort 2.0.0-rc.12 requires rustc 1.88+ (we can't promise 1.85)
  #   2. download-binaries fetches the ORT shared library at build
  #      time - this is unreliable under `cross`/qemu (proxy/cert
  #      issues) and on aarch64-Windows (no prebuilt for that
  #      target yet). We pin to host-native targets only.
  # This job runs on stable. Drop it (skip via path filter) if you
  # don't want the ML deps to gate merges.
  test-ml:
    name: ml test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ml-${{ matrix.target }}
      - run: cargo build -p llm-guard-ml --target ${{ matrix.target }} --verbose
      - run: cargo test -p llm-guard-ml --target ${{ matrix.target }} --verbose
